name: Build PowerClient Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Install Gradle 2.14
        run: |
          wget https://services.gradle.org/distributions/gradle-2.14.1-bin.zip
          unzip gradle-2.14.1-bin.zip
          echo "$PWD/gradle-2.14.1/bin" >> $GITHUB_PATH

      - name: Setup Workspace
        run: gradle setupDecompWorkspace

      - name: Build Mod
        run: gradle build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: PowerClient-1.0.0
          path: build/libs/PowerClient-1.0.0.jar
